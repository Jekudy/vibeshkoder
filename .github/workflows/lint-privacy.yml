name: Lint Privacy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-privacy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run privacy literal allowlist check
        run: bash scripts/lint_privacy_check.sh
