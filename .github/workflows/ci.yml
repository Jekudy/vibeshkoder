name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vibe
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: vibe_gatekeeper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vibe -d vibe_gatekeeper"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      BOT_TOKEN: 123456:test-token
      COMMUNITY_CHAT_ID: -1001234567890
      ADMIN_IDS: '[149820031]'
      # Postgres service is reachable on localhost:5432 from the runner.
      DATABASE_URL: postgresql+asyncpg://vibe:changeme@localhost:5432/vibe_gatekeeper
      REDIS_URL: redis://redis:6379/0
      GOOGLE_SHEETS_CREDS_FILE: ""
      GOOGLE_SHEET_ID: ""
      WEB_BASE_URL: http://localhost:8080
      WEB_BOT_USERNAME: vibeshkoder_dev_bot
      DB_PASSWORD: changeme
      WEB_PASSWORD: test-pass
      WEB_SESSION_SECRET: test-session-secret
      DEV_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,healing]"

      - name: Run alembic migrations against the test postgres
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

      - name: Run lint
        run: ruff check .

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep:1.161.0
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: >
          semgrep scan --error
          --config p/python
          --config p/security-audit
          --config p/secrets
          .
