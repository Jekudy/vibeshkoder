name: Release Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BOT: ghcr.io/jekudy/vibe-gatekeeper-bot
  IMAGE_WEB: ghcr.io/jekudy/vibe-gatekeeper-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.bot
          push: true
          tags: |
            ${{ env.IMAGE_BOT }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_BOT }}:main

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_WEB }}:main
